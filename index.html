<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정혁 — Solo entrepreneur as AI consultant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-noise" aria-hidden="true"></div>
  <main class="card" id="card">
    <div class="card__glow" aria-hidden="true"></div>

    <div class="card__avatar" role="img" aria-label="우직하고 믿음직한 곰 캐릭터 프로필">
      <svg class="face face--bear" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="bear-fur" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7d5e4a"/>
            <stop offset="100%" stop-color="#4d3b32"/>
          </linearGradient>
          <linearGradient id="bear-fur-light" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#9a7a65"/>
            <stop offset="100%" stop-color="#6b5344"/>
          </linearGradient>
          <linearGradient id="bear-muzzle" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#e8dcc8"/>
            <stop offset="100%" stop-color="#c9b49a"/>
          </linearGradient>
          <radialGradient id="bear-ear-inner" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#a88872"/>
            <stop offset="100%" stop-color="#6d5244"/>
          </radialGradient>
          <filter id="bear-soft" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="0.6"/>
          </filter>
        </defs>
        <!-- Shoulders / body hint -->
        <ellipse cx="100" cy="198" rx="52" ry="28" fill="url(#bear-fur)"/>
        <!-- Ears (round, solid) -->
        <circle cx="48" cy="58" r="28" fill="url(#bear-fur-light)"/>
        <circle cx="152" cy="58" r="28" fill="url(#bear-fur-light)"/>
        <circle cx="48" cy="58" r="14" fill="url(#bear-ear-inner)"/>
        <circle cx="152" cy="58" r="14" fill="url(#bear-ear-inner)"/>
        <!-- Head: wide, dependable circle -->
        <circle cx="100" cy="118" r="72" fill="url(#bear-fur)"/>
        <ellipse cx="100" cy="128" rx="48" ry="44" fill="url(#bear-fur-light)" opacity="0.35"/>
        <!-- Muzzle: broad, trustworthy -->
        <ellipse cx="100" cy="138" rx="42" ry="34" fill="url(#bear-muzzle)"/>
        <!-- Nose -->
        <ellipse cx="100" cy="128" rx="14" ry="10" fill="#3d2e28"/>
        <ellipse cx="96" cy="125" rx="3" ry="2" fill="#6a5348" opacity="0.5"/>
        <!-- Calm, steady eyes -->
        <ellipse cx="72" cy="102" rx="10" ry="11" fill="#2a2218"/>
        <ellipse cx="128" cy="102" rx="10" ry="11" fill="#2a2218"/>
        <ellipse cx="74" cy="98" rx="3" ry="3" fill="#f5f0e8" opacity="0.95"/>
        <ellipse cx="130" cy="98" rx="3" ry="3" fill="#f5f0e8" opacity="0.95"/>
        <!-- Gentle, reliable smile -->
        <path d="M72 152 Q100 172 128 152" stroke="#8b6b55" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M78 150 Q100 162 122 150" stroke="#a08068" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85"/>
        <!-- Warm cheek hint (trust) -->
        <ellipse cx="52" cy="118" rx="16" ry="10" fill="#c49a82" opacity="0.25" filter="url(#bear-soft)"/>
        <ellipse cx="148" cy="118" rx="16" ry="10" fill="#c49a82" opacity="0.25" filter="url(#bear-soft)"/>
      </svg>
    </div>

    <header class="card__header">
      <h1 class="card__name">정혁</h1>
      <p class="card__role">Solo entrepreneur as AI consultant</p>
    </header>

    <p class="card__tagline" id="tagline">
      사업 가치와 AI 사이의 간극을 메꿉니다.
    </p>

    <ul class="card__contacts">
